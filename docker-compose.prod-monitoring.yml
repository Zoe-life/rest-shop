# Production SRE monitoring stack: Prometheus + Grafana + alerting rules
#
# This is for EXTERNAL production scraping.
# The API itself runs on Render.com (not in this compose file).
#
# Usage:
#   1. Set the env vars below (or export them before running)
#   2. docker compose -f docker-compose.prod-monitoring.yml up -d
#
# Required environment variables (set in shell or .env file):
#   METRICS_TOKEN         – must match METRICS_TOKEN on Render.com
#   RENDER_HOST           – e.g. rest-shop-api.onrender.com
#   GF_SECURITY_ADMIN_PASSWORD – strong password for Grafana admin
#
# Open:
#   Grafana    → http://<this-host>:3000
#   Prometheus → http://<this-host>:9090  (bind to 127.0.0.1 in production)

services:
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: rest-shop-prometheus-prod
    restart: unless-stopped
    ports:
      # Bind to localhost only – expose via a reverse proxy (nginx/caddy) with TLS
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus.prod.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus.rules.yml:/etc/prometheus/rules.yml:ro
      - prometheus_prod_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.listen-address=0.0.0.0:9090'
    environment:
      - METRICS_TOKEN=${METRICS_TOKEN}

  grafana:
    image: grafana/grafana:10.4.2
    container_name: rest-shop-grafana-prod
    restart: unless-stopped
    ports:
      # Bind to localhost only – expose via a reverse proxy with TLS
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:?GF_SECURITY_ADMIN_PASSWORD is required}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SERVER_ROOT_URL=https://${GRAFANA_DOMAIN:-localhost}/
      - GF_SMTP_ENABLED=${GF_SMTP_ENABLED:-false}
      - GF_SMTP_HOST=${GF_SMTP_HOST:-}
      - GF_SMTP_USER=${GF_SMTP_USER:-}
      - GF_SMTP_PASSWORD=${GF_SMTP_PASSWORD:-}
      - GF_SMTP_FROM_ADDRESS=${GF_SMTP_FROM_ADDRESS:-alerts@example.com}
    volumes:
      - grafana_prod_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  prometheus_prod_data:
  grafana_prod_data:
