global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'rest-shop-api'
    # In local development the API runs on port 3001.
    # In production, replace the target with your Render.com host and set
    # bearer_token to the value of your METRICS_TOKEN environment variable.
    static_configs:
      - targets: ['api:3001']
    # Uncomment and fill in when METRICS_TOKEN is configured:
    # bearer_token: '<your-metrics-token>'
    metrics_path: '/metrics'
    scheme: http
