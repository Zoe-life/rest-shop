global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: production
    service: rest-shop-api

# Load alerting rules
rule_files:
  - /etc/prometheus/rules.yml

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

scrape_configs:
  # Production: scrape the Render.com deployed API
  # Replace 'rest-shop-api.onrender.com' with your actual Render.com service host.
  # METRICS_TOKEN must match the value set in Render.com environment variables.
  # Generate a token with: openssl rand -hex 32
  - job_name: 'rest-shop-api'
    static_configs:
      - targets: ['rest-shop-api.onrender.com']
    scheme: https
    metrics_path: '/metrics'
    authorization:
      type: Bearer
      credentials: '<your-metrics-token>'
    scrape_timeout: 30s
