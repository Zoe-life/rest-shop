global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'rest-shop-api'
    # host.docker.internal resolves to the host machine from inside Docker.
    # The API runs on port 3001 when started with `npm start` in /api.
    static_configs:
      - targets: ['host.docker.internal:3001']
    metrics_path: '/metrics'
    scheme: http
    # Uncomment if METRICS_TOKEN is set in the API:
    # bearer_token: '<your-metrics-token>'
